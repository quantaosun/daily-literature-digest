name: Daily Literature Digest

on:
  schedule:
    # Runs daily at 1:00 AM UTC = 9:00 AM Beijing time
    - cron: '0 1 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      max_papers:
        description: 'Number of papers to fetch'
        required: false
        default: '8'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          # No external deps needed — all stdlib
          echo "Using Python stdlib only"

      - name: Run literature digest
        env:
          LLM_KEY:       ${{ secrets.LLM_KEY }}
          LLM_BASE_URL:  ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL:     ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          MAIL_SERVER:   ${{ secrets.MAIL_SERVER || 'smtp.qq.com' }}
          MAIL_PORT:     ${{ secrets.MAIL_PORT || '465' }}
          MAIL:          ${{ secrets.MAIL }}
          MAIL_PW:       ${{ secrets.MAIL_PW }}
          MAX_PAPERS:    ${{ github.event.inputs.max_papers || '8' }}
        run: python digest.py
