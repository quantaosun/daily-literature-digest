name: Daily Literature Digest

on:
  schedule:
    # Runs daily at 1:00 AM UTC = 9:00 AM Beijing time
    - cron: '0 1 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      max_papers:
        description: 'Number of papers to fetch'
        required: false
        default: '8'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          # No external deps needed — all stdlib
          echo "Using Python stdlib only"

      - name: Run literature digest
        env:
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:   ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL:      ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          SMTP_SERVER:    ${{ secrets.SMTP_SERVER || 'smtp.qq.com' }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT || '465' }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
          MAX_PAPERS:     ${{ github.event.inputs.max_papers || '8' }}
        run: python digest.py
